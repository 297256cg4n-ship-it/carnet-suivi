<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carnet de suivi — Marches</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --ink:#23262b;--paper:#f6f3ec;--paper-2:#ffffff;--line:#dcd6c6;
  --accent:#0f5d4f;--accent-2:#b5552b;--muted:#7a7568;
  --m1:#e8a838;--m2:#3d9bc4;--m3:#5ba35b;--m4:#7d5a3c;
  --m1-light:#fdf6e3;--m2-light:#e8f4f9;--m3-light:#edf7ed;--m4-light:#f2ece6;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Georgia',serif;background:var(--paper);color:var(--ink);min-height:100vh;}
.hidden{display:none!important;}
/* LOGIN */
#login-screen,#student-login-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:
    radial-gradient(circle at 20% 20%,rgba(15,93,79,.06),transparent 40%),
    radial-gradient(circle at 80% 80%,rgba(185,85,43,.07),transparent 45%),
    var(--paper);
  padding:20px;
}
.login-card{
  background:var(--paper-2);border:1px solid var(--line);border-radius:16px;
  padding:48px 40px;width:100%;max-width:400px;
  display:flex;flex-direction:column;gap:0;
  box-shadow:0 2px 20px rgba(0,0,0,.06);
}
.login-card .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:10px;}
.login-card h1{font-size:28px;font-weight:700;margin-bottom:28px;}
.login-card .login-hint{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.5;}
.login-card input{
  width:100%;padding:13px 15px;border:1.5px solid var(--line);
  border-radius:9px;font-size:15px;font-family:inherit;margin-bottom:14px;
  transition:border-color .15s;
}
.login-card input:focus{outline:none;border-color:var(--accent);}
.login-card button.primary{
  width:100%;padding:14px;background:var(--accent);color:#fff;border:none;
  border-radius:9px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;
  margin-bottom:10px;
}
.login-card button.primary:hover{background:#0d4f43;}
.login-card button.secondary-login{
  width:100%;padding:12px;background:transparent;color:var(--muted);
  border:1.5px solid var(--line);border-radius:9px;font-size:14px;
  font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:0;
  transition:border-color .15s,color .15s;
}
.login-card button.secondary-login:hover{border-color:var(--ink);color:var(--ink);}
.login-card .login-back{display:inline-block;margin-top:18px;font-size:13px;color:var(--muted);text-decoration:none;}
.login-card .login-back:hover{color:var(--ink);}
.login-card .login-sep{height:1px;background:var(--line);margin:20px 0;}
.err{color:#a32b2b;font-size:13px;min-height:18px;margin-bottom:6px;}
/* TOPBAR */
header.topbar{background:#23262b;color:#f3f1e9;display:flex;align-items:center;gap:14px;padding:12px 20px;flex-wrap:wrap;position:sticky;top:0;z-index:20;}
.brand{display:flex;align-items:center;gap:10px;}
.brand h1{font-size:16px;font-weight:700;color:#f3f1e9;}
.role-badge{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:3px 9px;border-radius:20px;background:#454a52;color:#cfcabb;}
body.is-admin .role-badge{background:var(--accent-2);color:#fff;}
body.is-vie-scolaire .role-badge{background:#5b3fa0;color:#fff;}
.tab-retenue{color:#d4a017;font-weight:700;}
.tab-retenue.active{background:#fef9ec;color:#7a5a00;}
nav.tabs{display:flex;gap:6px;flex:1;}
nav.tabs button{background:transparent;border:1px solid transparent;color:#cfcabb;padding:7px 13px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;}
nav.tabs button.active{background:#f3f1e9;color:var(--ink);}
nav.tabs button:hover:not(.active){border-color:#454a52;}
nav.tabs button.tab-alert{color:#e3b9b9;font-weight:700;}
nav.tabs button.tab-alert.active{background:#fdeceb;color:#7a2020;}
.admin-menu{position:relative;}
.admin-menu-trigger{display:none;}
.admin-menu-panel{display:contents;}
.admin-menu-panel .btn{padding:6px 10px;font-size:12px;font-weight:500;color:#cfcabb;border-color:#454a52;background:transparent;}
.admin-menu-panel .btn:hover{color:#fff;border-color:#6a6f78;}
body:not(.is-admin) .admin-only{display:none!important;}
body:not(.is-admin):not(.is-vie-scolaire) .retenues-only{display:none!important;}
/* MAIN */
main{padding:26px 22px 60px;max-width:1100px;margin:0 auto;}
/* CARDS & LAYOUT */
.card{background:var(--paper-2);border:1px solid var(--line);border-radius:10px;padding:20px;margin-bottom:16px;}
.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
.field label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);}
.field input,.field select,.field textarea{padding:9px 12px;border:1px solid var(--line);border-radius:8px;font-size:14px;font-family:inherit;}
.field textarea{resize:vertical;min-height:80px;}
.section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:12px;}
.empty{color:var(--muted);font-size:14px;padding:20px 0;text-align:center;}
.small{font-size:13px;}.muted{color:var(--muted);}
.back-link{font-size:13px;color:var(--accent);text-decoration:none;display:inline-block;margin-bottom:16px;}
/* BUTTONS */
.btn{border:1px solid var(--line);background:#fff;padding:8px 13px;border-radius:7px;font-size:13px;font-weight:600;color:var(--ink);cursor:pointer;font-family:inherit;}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn.warn{background:#fff;color:#a32b2b;border-color:#e3b9b9;}
.btn.danger{background:#a32b2b;color:#fff;border-color:#a32b2b;font-weight:700;}
.btn.danger:hover{background:#8a2222;}
/* TABLES */
table{width:100%;border-collapse:collapse;font-size:14px;}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);padding:8px 10px;border-bottom:2px solid var(--line);}
td{padding:9px 10px;border-bottom:1px solid var(--line);}
tr.row-link{cursor:pointer;}
tr.row-link:hover td{background:#f0ede6;}
tr.row-link:nth-child(even) td{background:#f9f8f4;}
tr.row-link:nth-child(even):hover td{background:#f0ede6;}
tr.pastille-row{background:#fdeceb;font-weight:700;color:#7a2020;}
tr.pastille-row td{border-bottom-color:#e3b9b9;}
tr.carnet-row{background:#fef5ec;color:#7a4000;}
tr.carnet-row td{border-bottom-color:#f5cba7;}
tr.retenue-row{background:#fef9ec;color:#7a5a00;font-weight:700;}
tr.retenue-row td{border-bottom-color:#f7dc6f;}
/* MARCHES */
.m1{background:var(--m1)!important;}.m2{background:var(--m2)!important;}.m3{background:var(--m3)!important;}.m4{background:var(--m4)!important;}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;color:#fff;}
.badge.m1{background:var(--m1);}.badge.m2{background:var(--m2);}.badge.m3{background:var(--m3);}.badge.m4{background:var(--m4);}
.badge.m-pastille{background:#888;color:#fff;}
.badge.m-carnet{background:#e67e22;color:#fff;}
/* LADDER — design en escalier, hauteur croissante, numéro affiché dessus */
.ladder{display:flex;flex-direction:row;align-items:flex-end;gap:6px;margin:16px 0 12px;height:130px;}
.step{
  flex:1;border-radius:8px 8px 0 0;display:flex;flex-direction:column;
  align-items:center;justify-content:flex-start;padding-top:8px;
  font-weight:700;cursor:default;position:relative;min-height:52px;
}
.step.m1{height:35%;background:var(--m1-light);border:2px solid var(--m1);color:var(--m1);}
.step.m2{height:55%;background:var(--m2-light);border:2px solid var(--m2);color:var(--m2);}
.step.m3{height:75%;background:var(--m3-light);border:2px solid var(--m3);color:var(--m3);}
.step.m4{height:98%;background:var(--m4-light);border:2px solid var(--m4);color:var(--m4);}
.step.current.m1{background:var(--m1);color:#fff;box-shadow:0 4px 14px rgba(232,168,56,.5);}
.step.current.m2{background:var(--m2);color:#fff;box-shadow:0 4px 14px rgba(61,155,196,.5);}
.step.current.m3{background:var(--m3);color:#fff;box-shadow:0 4px 14px rgba(91,163,91,.5);}
.step.current.m4{background:var(--m4);color:#fff;box-shadow:0 4px 14px rgba(46,125,94,.5);}
.step .step-num{font-size:22px;font-weight:800;line-height:1;margin-bottom:2px;}
.step .step-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;opacity:.85;text-align:center;padding:0 2px;}
.step.current .step-label{opacity:1;}
.step .step-arrow{position:absolute;bottom:5px;font-size:13px;}
/* MARCHE PICKER */
.marche-picker{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.marche-picker button{padding:8px 16px;border-radius:8px;border:2px solid transparent;font-size:13px;font-weight:700;color:#fff;cursor:pointer;}
.marche-picker button.m1{background:var(--m1);}.marche-picker button.m2{background:var(--m2);}
.marche-picker button.m3{background:var(--m3);}.marche-picker button.m4{background:var(--m4);}
.marche-picker button.active{border-color:#23262b;box-shadow:0 0 0 2px #23262b;}
/* CATEGORIES — menu déroulant vertical clair */
.cat-list{display:flex;flex-direction:column;gap:8px;margin-top:10px;}
.cat-item{border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#fff;}
.cat-item-header{
  padding:13px 16px;cursor:pointer;display:flex;justify-content:space-between;
  align-items:center;background:var(--paper);user-select:none;
  transition:background .1s;
}
.cat-item-header:hover{background:#eeece6;}
.cat-item-header .cat-label{font-weight:700;font-size:14px;color:var(--ink);}
.cat-item-header .cat-meta{display:flex;align-items:center;gap:10px;}
.cat-item-header .cat-pts{
  font-size:12px;font-weight:700;padding:3px 9px;border-radius:12px;
  background:#fff;border:1px solid var(--line);color:var(--accent);
}
.cat-item-header .cat-arrow{font-size:12px;color:var(--muted);transition:transform .15s;}
.cat-item-header.open .cat-arrow{transform:rotate(180deg);}
.cat-item-motifs{display:none;border-top:1px solid var(--line);}
.cat-item-motifs.open{display:block;}
.cat-item-motifs button{
  display:flex;align-items:center;gap:10px;width:100%;text-align:left;
  padding:11px 16px;background:none;border:none;border-bottom:1px solid var(--line);
  font-size:13px;cursor:pointer;font-family:inherit;color:var(--ink);
}
.cat-item-motifs button:last-child{border-bottom:none;}
.cat-item-motifs button:hover{background:#f4f2eb;}
.cat-item-motifs button::before{content:"•";color:var(--muted);font-size:16px;flex-shrink:0;}
.cat-item-autres{padding:12px 16px;border-top:1px solid var(--line);}
/* SECTION TITLE — plus visible */
.section-title{
  font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;
  color:var(--ink);margin-bottom:14px;padding-bottom:8px;
  border-bottom:2px solid var(--line);
}
/* POINTS METER */
.points-meter{height:10px;background:var(--line);border-radius:5px;overflow:hidden;margin-top:8px;}
.points-meter .fill{height:100%;border-radius:5px;transition:width .3s;}
.points-meter .fill.ok{background:var(--accent);}
.points-meter .fill.warn{background:#e67e22;}
.points-meter .fill.danger{background:#c0392b;}
/* BLOC BADGE */
.bloc-badge{display:inline-flex;align-items:center;gap:6px;background:#eef4f1;border:1px solid #cfe3da;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700;color:var(--accent);}
/* WEEK BANNER */
.week-banner{display:flex;align-items:center;justify-content:space-between;background:#eef4f1;border:1px solid #cfe3da;border-radius:9px;padding:12px 16px;margin-bottom:16px;font-size:13px;gap:10px;flex-wrap:wrap;}
/* PASTILLE BANNER */
.pastille-banner{display:flex;align-items:center;background:#fdeceb;border:1px solid #e3b9b9;color:#7a2020;border-radius:9px;padding:12px 16px;margin-bottom:16px;font-size:14px;font-weight:700;}
.pastille-card{border-color:#e3b9b9;}
.pastille-card table th{color:#a32b2b;}
/* Journal mobile-friendly */
.journal-table{width:100%;font-size:13px;}
.journal-table .td-date{white-space:nowrap;width:80px;font-size:12px;}
.journal-table .td-motif{min-width:140px;}
.journal-table .td-auteur{font-size:12px;color:var(--muted);}
@media(max-width:520px){
  .journal-table .td-auteur{display:none;}
  .journal-table th:nth-child(3){display:none;}
}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;}
.modal{background:#fff;border-radius:12px;padding:28px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto;}
.modal h3{font-size:18px;margin-bottom:16px;}
/* TOAST */
#toast-container{position:fixed;bottom:24px;right:24px;z-index:200;display:flex;flex-direction:column;gap:8px;}
.toast{background:#23262b;color:#f3f1e9;padding:10px 18px;border-radius:8px;font-size:13px;animation:slideIn .2s ease;}
@keyframes slideIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
/* MOBILE */
@media(max-width:720px){
  header.topbar{padding:10px 12px;gap:8px;}
  .brand h1{font-size:14px;}
  nav.tabs{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;gap:4px;flex:1 1 100%;order:3;}
  nav.tabs::-webkit-scrollbar{height:0;}
  nav.tabs button{padding:7px 10px;font-size:12px;flex-shrink:0;}
  .admin-menu{order:2;margin-left:auto;}
  .admin-menu-trigger{display:inline-flex;background:transparent;border:1px solid #454a52;color:#f3f1e9;width:36px;height:36px;border-radius:7px;font-size:18px;align-items:center;justify-content:center;cursor:pointer;}
  .admin-menu-panel{display:none;}
  .admin-menu.open .admin-menu-panel{display:flex;flex-direction:column;position:absolute;top:44px;right:0;background:var(--paper-2);border:1px solid var(--line);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.18);padding:8px;gap:4px;min-width:220px;z-index:40;}
  .admin-menu.open .admin-menu-panel .btn{width:100%;text-align:left;color:var(--ink);background:#fff;border-color:var(--line);font-size:14px;padding:9px 14px;}
}
@media print{body{margin:0;padding:14px;}}
</style>
</head>

<!-- TOAST CONTAINER -->
<div id="toast-container"></div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="eyebrow">Carnet de suivi — les Marches</div>

    <!-- Étape 1 : choix du rôle -->
    <div id="login-step-choice">
      <h1>Connexion</h1>

      <div class="login-sep"></div>

      <button class="primary" id="login-btn">Entrer</button>
      <a href="#" class="login-back" id="back-to-choice-1">← Retour</a>
    </div>

    <!-- Étape 2b : login admin -->

      <div class="eyebrow">Espace administrateur</div>

      <button class="primary" id="login-admin-btn">Entrer</button>
      <a href="#" class="login-back" id="back-to-choice-2">← Retour</a>
    </div>
  </div>
</div>

<!-- ACCÈS ÉLÈVE (lecture seule QR code) -->
<div id="student-login-screen" class="hidden">
  <div class="login-card">
    <div class="eyebrow">Carnet de suivi · accès élève</div>
    <h1>Ta fiche de suivi</h1>
    <div id="student-login-err" class="err"></div>

    <div class="login-sep"></div>
    <p class="small" style="text-align:center;color:var(--muted);">Tu es enseignant(e) ? <a href="#" id="goto-teacher-login" style="color:var(--accent);">Connexion →</a></p>
  </div>
</div>

<!-- FICHE ÉLÈVE LECTURE SEULE -->
<div id="student-view-screen" class="hidden"></div>

<!-- APP -->
<div id="app" class="hidden">
  <header class="topbar">
    <div class="brand">
      <h1>Carnet de suivi — les Marches</h1>
      <span class="role-badge" id="role-badge"></span>
    </div>
    <nav class="tabs" id="tabs">
      <button data-tab="accueil" class="active">Élèves</button>
      <button data-tab="classes">Classes</button>
      <button data-tab="semaines">Semaines</button>
      <button data-tab="pastilles" class="tab-alert">⚠ Pastilles</button>

      <button data-tab="memo">Mémo</button>
      <button data-tab="admin" class="admin-only">⚙ Admin</button>
      <button data-tab="qrcodes" style="margin-left:12px;opacity:.7;border-left:1px solid #454a52;padding-left:16px;">QR codes</button>
    </nav>
    <div class="admin-menu" id="admin-menu">
      <button class="admin-menu-trigger" id="admin-menu-trigger">⋯</button>
      <div class="admin-menu-panel">
        <button class="btn admin-only" id="export-btn">Exporter</button>
        <button class="btn" id="undo-btn">↩ Annuler</button>
        <button class="btn" id="logout-btn">Verrouiller</button>
      </div>
    </div>
  </header>
  <main id="main-content"></main>
</div>

function todayISO(){
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function pad(n){ return String(n).padStart(2,'0'); }
function mondayOf(iso){
  const d = new Date(iso+'T00:00:00');
  const day = d.getDay();
  const diff = day===0 ? -6 : 1-day;
  d.setDate(d.getDate()+diff);
  return isoFromDate(d);
}
function addDays(iso,n){
  const d = new Date(iso+'T00:00:00');
  d.setDate(d.getDate()+n);
  return isoFromDate(d);
}
function isoFromDate(d){
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function formatDateFr(iso){
  if(!iso) return '';
  const d = new Date(iso+'T00:00:00');
  return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'});
}
function currentMondayISO(){ return mondayOf(todayISO()); }
function isVacances(iso){
  return DATA.vacances.some(v=> iso>=v.debut && iso<=v.fin);
}

/* ============================================================
   STRUCTURE DES BLOCS DE 3 SEMAINES
   Un bloc = 3 semaines de SUIVI EFFECTIF (hors vacances).
   Les vacances suspendent le bloc; il reprend après.
   ============================================================ */
function buildBlocs(){
  // Reconstruit la liste de tous les blocs en tenant compte des resets manuels.
  // Le point de départ est le plus tôt entre FIRST_BLOC_START et le premier
  // reset manuel — ce qui permet de faire démarrer le suivi avant le 31 août
  // si l'admin a forcé un début de bloc antérieur.
  const manualResets = (DATA.blocResets||[]).slice().sort();
  const earliest = manualResets.length && manualResets[0] < FIRST_BLOC_START
    ? manualResets[0]
    : FIRST_BLOC_START;

  let blocs = [];
  let cursor = earliest;
  const today = todayISO();

  while(cursor <= addDays(today, 200)){
    const bloc = {id:genId(), dateDebut:cursor, semaines:[]};
    const nextReset = manualResets.find(r => r > cursor);

    while(bloc.semaines.length < 3){
      if(nextReset && cursor >= nextReset){ break; }
      const lundi = mondayOf(cursor);
      if(isVacances(lundi)){
        cursor = addDays(lundi, 7);
        continue;
      }
      const dimanche = addDays(lundi, 6);
      bloc.semaines.push({start:lundi, end:dimanche});
      cursor = addDays(lundi, 7);
    }
    if(bloc.semaines.length > 0) blocs.push(bloc);
    if(nextReset && cursor <= nextReset) cursor = nextReset;
  }
  return blocs;
}

function currentBloc(){
  const blocs = buildBlocs();
  const today = todayISO();
  return blocs.find(b=>{
    const last = b.semaines[b.semaines.length-1];
    return last && today <= last.end;
  }) || blocs[blocs.length-1];
}

function currentSemaineInBloc(){
  const bloc = currentBloc();
  if(!bloc) return null;
  const today = todayISO();
  return bloc.semaines.find(s=> today >= s.start && today <= s.end);
}

function semaineIndexInBloc(semaineStart){
  const blocs = buildBlocs();
  for(const bloc of blocs){
    const idx = bloc.semaines.findIndex(s=>s.start===semaineStart);
    if(idx>=0) return {bloc, idx, total: bloc.semaines.length};
  }
  return null;
}

/* ============================================================
   STORAGE (GitHub via Cloudflare Worker proxy)
   ============================================================ */
function _proxyUrl(filename){
  return `${PROXY_URL}?file=${encodeURIComponent(filename)}`;
}
function _b64encode(str){ return btoa(unescape(encodeURIComponent(str))); }
function _b64decode(b64){ return decodeURIComponent(escape(atob(b64))); }

async function _ghReadFile(filename){
  const res = await fetch(_proxyUrl(filename));
  if(!res.ok) throw new Error('HTTP '+res.status);
  const json = await res.json();
  if(!json||!json.content) throw new Error('HTTP 404');
  return {sha:json.sha, content:JSON.parse(_b64decode(json.content))};
}
async function _ghWriteFile(filename,dataObj,sha,message){
  const body={message:message||'Mise à jour',content:_b64encode(JSON.stringify(dataObj,null,2))};
  if(sha) body.sha=sha;
  const res = await fetch(_proxyUrl(filename),{
    method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)
  });
  if(res.status===409||res.status===422) throw new Error('CONFLICT');
  if(!res.ok) throw new Error('HTTP '+res.status);
  const json = await res.json();
  return json.content.sha;
}

function _diffById(before,after){
  const bm=new Map((before||[]).map(x=>[x.id,x]));
  const am=new Map((after||[]).map(x=>[x.id,x]));
  const added=[],updated=[],removedIds=[];
  for(const [id,item] of am){
    if(!bm.has(id)) added.push(item);
    else if(JSON.stringify(bm.get(id))!==JSON.stringify(item)) updated.push(item);
  }
  for(const id of bm.keys()){ if(!am.has(id)) removedIds.push(id); }
  return {added,updated,removedIds};
}
function _applyDiff(serverArr,diff){
  let r=(serverArr||[]).filter(x=>!diff.removedIds.includes(x.id));
  for(const u of diff.updated){ const i=r.findIndex(x=>x.id===u.id); if(i>=0)r[i]=u; else r.push(u); }
  for(const a of diff.added){ if(!r.some(x=>x.id===a.id)) r.push(a); }
  return r;
}
function _mergeIntoServer(serverData,before,after){
  const m=JSON.parse(JSON.stringify(serverData));
  m.students=_applyDiff(serverData.students,_diffById(before.students,after.students));
  m.classes=_applyDiff(serverData.classes,_diffById(before.classes,after.classes));
  m.weeks=_applyDiff(serverData.weeks,_diffById(before.weeks,after.weeks));
  m.staff=_applyDiff(serverData.staff,_diffById(before.staff,after.staff));
  m.vacances=_applyDiff(serverData.vacances,_diffById(before.vacances,after.vacances));
  if(after.currentWeekStart!==before.currentWeekStart) m.currentWeekStart=after.currentWeekStart;
  if(after.adminPasswordHash!==before.adminPasswordHash) m.adminPasswordHash=after.adminPasswordHash;
  if(JSON.stringify(after.memo)!==JSON.stringify(before.memo)) m.memo=after.memo;
  if(JSON.stringify(after.blocResets)!==JSON.stringify(before.blocResets)) m.blocResets=after.blocResets;
  return m;
}

async function loadData(){
  try{
    const {sha,content}=await _ghReadFile('donnees.json');
    lastKnownSha=sha; DATA=content;
  }catch(e){
    DATA={staff:[],classes:[],students:[],weeks:[],blocs:[],vacances:[],memo:{m1:"",m2:"",m3:"",m4:""},currentWeekStart:FIRST_BLOC_START,adminPasswordHash:null,blocResets:[]};
    toast("Impossible de charger les données. Connexion vérifiée ?");
  }
  if(!DATA.staff) DATA.staff=[];
  if(!DATA.classes) DATA.classes=[];
  if(!DATA.students) DATA.students=[];
  if(!DATA.weeks) DATA.weeks=[];
  if(!DATA.vacances) DATA.vacances=[];
  if(!DATA.memo) DATA.memo={m1:"",m2:"",m3:"",m4:""};
  if(!DATA.blocResets) DATA.blocResets=[];
  if(!DATA.currentWeekStart) DATA.currentWeekStart=FIRST_BLOC_START;
  if(!DATA.customMotifs) DATA.customMotifs={};
  if(!DATA.memoAttachments) DATA.memoAttachments={};
  if(!DATA.memoPresentation) DATA.memoPresentation='';
  // Si currentWeekStart est dans le futur mais qu'un blocReset dans le passé
  // existe, on recale sur ce blocReset (cas où l'admin a forcé un début anticipé)
  const today=todayISO();
  const resets=(DATA.blocResets||[]).slice().sort();
  const passedResets=resets.filter(r=>r<=today);
  if(passedResets.length && DATA.currentWeekStart > today){
    DATA.currentWeekStart=passedResets[passedResets.length-1];
  }
  // Migration des anciens formats (status='pastille'|'carnet') + expiration auto
  migrateOldPastilleData();
  checkPastillesExpirees();
  lastKnownData=JSON.parse(JSON.stringify(DATA));
}

async function saveData(label){
  const localBefore=lastKnownData;
  const localAfter=JSON.parse(JSON.stringify(DATA));
  const MAX=4;
  for(let attempt=0;attempt<=MAX;attempt++){
    try{
      lastKnownSha=await _ghWriteFile('donnees.json',DATA,lastKnownSha,'Mise à jour du carnet');
      lastKnownData=localAfter;
      if(label!==false){
        undoStack.push({before:localBefore,after:localAfter,label:label||'Action',date:new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})});
        if(undoStack.length>20) undoStack.shift();
      }
      return;
    }catch(e){
      if(e.message==='CONFLICT'&&attempt<MAX){
        try{
          const {sha,content:serverData}=await _ghReadFile('donnees.json');
          lastKnownSha=sha;
          DATA=_mergeIntoServer(serverData,localBefore,localAfter);
          render();
          continue;
        }catch{ toast("⚠️ Enregistrement impossible. Réessaie."); return; }
      } else {
        toast("⚠️ Enregistrement impossible. Réessaie.");
        return;
      }
    }
  }
}

async function undoLastAction(){
  if(!undoStack.length){ toast("Rien à annuler."); return; }
  const last=undoStack.pop();
  try{
    const {sha,content:serverData}=await _ghReadFile('donnees.json');
    lastKnownSha=sha;
    DATA=_mergeIntoServer(serverData,last.after,last.before);
    lastKnownData=JSON.parse(JSON.stringify(DATA));
    await _ghWriteFile('donnees.json',DATA,lastKnownSha,'Annulation : '+last.label).then(s=>lastKnownSha=s);
    toast(`Annulé : ${last.label}`);
    render();
  }catch{ undoStack.push(last); toast("⚠️ Impossible d'annuler."); }
}

async function sha256Hex(text){
  if(!window.crypto||!window.crypto.subtle) throw new Error("HTTPS requis pour la connexion sécurisée.");
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function doLogin(role){
  const isAdminLogin = role==='admin';
  const inputEl = document.getElementById(isAdminLogin?'login-admin-input':'login-input');
  const errEl   = document.getElementById(isAdminLogin?'login-admin-err':'login-err');
  const btn     = document.getElementById(isAdminLogin?'login-admin-btn':'login-btn');
  const val     = inputEl.value.trim();
  btn.disabled=true; errEl.textContent='';
  try{
    if(!lastKnownData) await loadData();
    const candidateHash = await sha256Hex(val);

    if(isAdminLogin){
      // Mot de passe admin : hash stocké dans DATA, ou valeur par défaut
      const validHash = DATA.adminPasswordHash || await sha256Hex(ADMIN_PWD_DEFAULT);
      if(candidateHash===validHash){
        if(!DATA.adminPasswordHash){ DATA.adminPasswordHash=validHash; await saveData(false); }
        currentUser={id:'admin',nom:'Administrateur',prenom:'',code:'',role:'admin'};
        sessionStorage.setItem('cs-user',JSON.stringify(currentUser));
        await enterApp(true); return;
      }
      errEl.textContent="Mot de passe administrateur incorrect.";
    } else {
      // Mode enseignant
      if(DATA.staff.length){
        // Des comptes existent → on vérifie par code individuel
        const staffMember=DATA.staff.find(s=>s.code===val);
        if(staffMember){
          currentUser=staffMember;
          sessionStorage.setItem('cs-user',JSON.stringify(currentUser));
          await enterApp(true); return;
        }
        errEl.textContent="Code incorrect. Contactez l'administrateur si vous n'avez pas encore de code.";
      } else {
        // Pas encore de comptes → mot de passe commun de secours
        const fallbackHash = await sha256Hex(atob(TEACHER_PWD_FALLBACK_ENCODED));
        if(candidateHash===fallbackHash){
          currentUser={id:'teacher-default',nom:'Enseignant',prenom:'',code:'',role:'teacher'};
          sessionStorage.setItem('cs-user',JSON.stringify(currentUser));
          await enterApp(true); return;
        }
        errEl.textContent="Mot de passe incorrect. (Aucun compte créé — utilisez CD44100!)";
      }
    }
  }catch(e){
    errEl.textContent=e.message.includes('HTTPS')?e.message:"Connexion impossible. Vérifie ta connexion.";
  }finally{ btn.disabled=false; }
}

/* ============================================================
   AUTO NOUVELLE SEMAINE
   ============================================================ */
async function checkAutoNewWeek(){
  const thisMonday=currentMondayISO();
  let safety=0, closedCount=0;
  while(DATA.currentWeekStart<thisMonday&&safety<52){
    const nextMonday=mondayOf(addDays(DATA.currentWeekStart,7));
    await closeWeek(nextMonday);
    closedCount++; safety++;
  }
  if(closedCount>0) toast(closedCount===1?"Nouvelle semaine démarrée.":`${closedCount} semaines clôturées automatiquement.`);
}

async function closeWeek(newWeekStart, silent){
  const endDate=todayISO();
  // Snapshot : la marche réelle + le fait d'être en pastille
  const snap=DATA.students.map(s=>({
    id:s.id, nom:s.nom, classeId:s.classeId,
    status: s.status, // marche réelle (m1/m2/m3/m4)
    enPastille: estEnPastille(s),
    points: s.points,
    contratValidé: !estEnPastille(s) && s.points>=(MARCHE_SEUIL[s.status]||0)
  }));
  DATA.weeks.push({id:genId(),dateDebut:DATA.currentWeekStart,dateFin:endDate,snapshot:snap});
  DATA.currentWeekStart=newWeekStart||endDate;

  for(const s of DATA.students){
    const seuil=MARCHE_SEUIL[s.status]||0;
    // Journal fin de semaine
    if(estEnPastille(s)){
      logEvent(s,`Fin de semaine en pastille${s.pastille.type==='auto'?' (automatique)':' (manuelle)'} — les points ne comptent pas.`);
    } else {
      const obj=s.points>=seuil;
      logEvent(s,`Fin de semaine : ${s.points}/20 pts — objectif ${seuil}pts ${obj?'✓ atteint':'✗ non atteint'}.`);
    }
    // Vérifier changement de marche en fin de bloc
    await checkBlocEnd(s);
    // Remettre à 20 points
    s.points=20;
    // Le carnet se réinitialise à chaque nouvelle semaine
    s.carnet=null;
    // Note : la pastille n'est PAS levée ici — elle suit son propre calendrier
    // (dimanche pour l'auto, J+7 pour la manuelle), géré par checkPastillesExpirees()
  }
  if(!silent) await saveData('Nouvelle semaine');
}

async function checkBlocEnd(s){
  // À appeler en fin de chaque semaine. Vérifie si c'est la fin d'un bloc
  // et calcule le changement de marche éventuel.
  const bloc=currentBloc();
  if(!bloc) return;
  const lastSemaine=bloc.semaines[bloc.semaines.length-1];
  if(!lastSemaine) return;
  const today=todayISO();
  if(today<lastSemaine.start||today>lastSemaine.end) return; // pas fin de bloc

  // Récupère les 3 semaines du bloc dans l'historique
  const weekResults=bloc.semaines.map(sem=>{
    const w=DATA.weeks.find(x=>x.dateDebut===sem.start);
    if(!w) return null;
    const snap=w.snapshot.find(x=>x.id===s.id);
    return snap||null;
  }).filter(Boolean);

  if(weekResults.length<bloc.semaines.length) return; // bloc pas complet

  const validées=weekResults.filter(r=>r.contratValidé).length;

  let newMarche=s.status;
  const marcheIdx=MARCHES.indexOf(s.status);

  // 2 semaines consécutives en pastille dans ce bloc → descend
  let maxConsecutive=0, cur=0;
  for(const r of weekResults){
    if(r.enPastille){ cur++; maxConsecutive=Math.max(maxConsecutive,cur); }
    else cur=0;
  }
  if(maxConsecutive>=2 && marcheIdx>0){
    newMarche=MARCHES[marcheIdx-1];
    logEvent(s,`Fin de bloc : 2 semaines consécutives en pastille → descend à ${MARCHE_LABEL[newMarche]}.`);
  } else if(validées===3 && marcheIdx<MARCHES.length-1){
    newMarche=MARCHES[marcheIdx+1];
    logEvent(s,`Fin de bloc : contrat validé 3/3 → monte à ${MARCHE_LABEL[newMarche]}.`);
  } else if(validées<3 && validées>0){
    logEvent(s,`Fin de bloc : contrat validé ${validées}/3 → reste à ${MARCHE_LABEL[s.status]}.`);
  } else if(validées===0 && marcheIdx>0){
    newMarche=MARCHES[marcheIdx-1];
    logEvent(s,`Fin de bloc : contrat non validé 0/3 → descend à ${MARCHE_LABEL[newMarche]}.`);
  }
  s.status=newMarche;
}

/* ============================================================
   UTIL
   ============================================================ */
function genId(){ return Math.random().toString(36).slice(2,10); }
function esc(str){ return String(str||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function isAdmin(){ return currentUser&&currentUser.role==='admin'; }
function isVieScolaire(){ return currentUser&&(currentUser.role==='vie-scolaire'||currentUser.role==='admin'); }
/* Détecte le rôle depuis la fonction : vie-scolaire si AED, CPE, principal, secrétaire, etc. */
function detectRole(fonction){
  const f=(fonction||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
  if(f.includes('aed')||f.includes('assistant')||f.includes('education')||
     f.includes('cpe')||f.includes('principal')||f.includes('adjoint')||
     f.includes('secretaire')||f.includes('secrétaire')||f.includes('vie scolaire')||
     f.includes('surveillant')||f.includes('direction'))
    return 'vie-scolaire';
  return 'teacher';
}
function marcheLabelNum(m){ return `${MARCHES.indexOf(m)+1}. ${MARCHE_LABEL[m]||m}`; }

/* --- Affichage abrégé du nom ---
   Format stocké : "DUPONT Lucas" (nom de famille en premier).
   On cherche la longueur minimale du préfixe du nom de famille qui rend
   chaque combinaison "PRÉFIXE. Prénom" unique dans toute la liste.
   Si deux homonymes complets existent, leur classe les différenciera.
   Le vrai nom n'est jamais modifié en base, c'est uniquement l'affichage.
*/
function splitNom(fullNom){
  // Format attendu : "DUPONT DUVAL Lucas Marie" où les mots tout en
  // majuscules sont le nom de famille, et le reste est le prénom.
  // On prend UNIQUEMENT le PREMIER mot du nom de famille (même s'il est composé).
  const parts=(fullNom||'').trim().split(/\s+/);
  // Sépare les mots qui sont TOUT EN MAJUSCULES (nom) de ceux qui ne le sont pas (prénom)
  let lastFamilleIdx=-1;
  for(let i=0;i<parts.length;i++){
    if(parts[i]===parts[i].toUpperCase()&&parts[i].length>0) lastFamilleIdx=i;
    else break; // dès qu'on tombe sur un mot non-majuscule, on arrête
  }
  const premierNomFamille = lastFamilleIdx>=0 ? parts[0] : '';
  const prenom = parts.slice(lastFamilleIdx+1).join(' ');
  return { famille: premierNomFamille, prenom };
}

// Calcule, pour TOUTE la liste d'élèves, la longueur de préfixe nécessaire
// pour chaque élève afin que "PRÉFIXE. Prénom" soit unique dans la liste.
// Résultat mis en cache par identifiant pour éviter de recalculer à chaque render.
let _prefixCache = null;
let _prefixCacheStamp = null;

function buildPrefixLengths(students){
  const stamp=students.map(s=>s.id+s.nom).join('|');
  if(_prefixCache&&_prefixCacheStamp===stamp) return _prefixCache;

  const result={};
  students.forEach(s=>{
    const {famille, prenom}=splitNom(s.nom);
    if(!famille){ result[s.id]=0; return; }

    // Si personne d'autre n'a exactement le même prénom → 1 lettre suffit toujours
    const mêmePrenom=students.filter(o=>
      o.id!==s.id &&
      splitNom(o.nom).prenom.toLowerCase()===prenom.toLowerCase()
    );
    if(!mêmePrenom.length){ result[s.id]=1; return; }

    // Parmi ceux qui ont le même prénom, trouver le préfixe minimal qui différencie
    let len=1;
    while(len<=famille.length){
      const prefixe=famille.slice(0,len).toUpperCase();
      const collision=mêmePrenom.some(o=>{
        const {famille:of}=splitNom(o.nom);
        return of.slice(0,len).toUpperCase()===prefixe;
      });
      if(!collision) break;
      len++;
    }
    result[s.id]=Math.min(len,famille.length);
  });

  _prefixCache=result;
  _prefixCacheStamp=stamp;
  return result;
}

function displayNom(student, allStudents){
  const pool = allStudents || DATA.students;
  const {famille, prenom} = splitNom(student.nom);
  if(!famille) return student.nom;
  const lengths = buildPrefixLengths(pool);
  const len = lengths[student.id] || 1;
  return `${famille.slice(0,len).toUpperCase()}. ${prenom}`;
}

function statusBadge(s){
  const badges=[];
  if(estEnPastille(s)){
    const fin=finPastille(s);
    badges.push(`<span class="badge m-pastille">Pastille${fin?' jusqu\'au '+formatDateFr(fin):''}</span>`);
  }
  if(estEnCarnet(s)){
    badges.push(`<span class="badge m-carnet">Carnet oublié</span>`);
  }
  if(badges.length) return badges.join(' ');
  return `<span class="badge ${s.status}">${marcheLabelNum(s.status)}</span>`;
}

function logEvent(s,label,details){
  s.history=s.history||[];
  s.history.push(Object.assign({
    id:genId(),
    date:new Date().toLocaleDateString('fr-FR'),
    heure:new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}),
    auteur:currentUser?currentUser.nom:'—',
    label
  },details||{}));
}

function isPastilleEvent(h){ return (h.label||'').toLowerCase().includes('pastille'); }

function toast(msg){
  const c=document.getElementById('toast-container');
  const t=document.createElement('div');
  t.className='toast'; t.textContent=msg;
  c.appendChild(t);
  setTimeout(()=>t.remove(),3500);
}

function newStudent(nom,classeId){
  return {
    id:genId(), nom, classeId,
    status:MARCHE_DEFAULT,   // marche réelle : m1/m2/m3/m4 (jamais 'pastille' ni 'carnet')
    points:20, history:[],
    pastille:null,           // {type:'auto'|'manuelle', debut, fin} ou null
    carnet:null,             // {date} ou null (suspension de la journée)
  };
}

/* --- Helpers d'état élève ---
   On distingue maintenant la marche réelle (s.status) des suspensions
   temporaires (pastille, carnet) stockées séparément, pour qu'elles
   puissent coexister.
*/
function estEnPastille(s){ return !!s.pastille; }
function estEnCarnet(s){ return !!s.carnet; }
function estSuspendu(s){ return estEnPastille(s)||estEnCarnet(s); }
function finPastille(s){ return s.pastille?s.pastille.fin:null; }
function typePastille(s){ return s.pastille?s.pastille.type:null; }

/* Vérifier et lever automatiquement les pastilles expirées (appelé au chargement) */
function checkPastillesExpirees(){
  const today=todayISO();
  let changed=false;
  DATA.students.forEach(s=>{
    // Pastille manuelle : expire 7 jours après le début
    if(s.pastille&&s.pastille.fin&&today>s.pastille.fin){
      logEvent(s,`Pastille levée automatiquement (7 jours écoulés — fin le ${formatDateFr(s.pastille.fin)}).`);
      s.pastille=null;
      changed=true;
    }
    // Carnet : expire à la fin de la journée où il a été posé
    if(s.carnet&&s.carnet.date&&today>s.carnet.date){
      s.carnet=null;
      changed=true;
    }
  });
  return changed;
}

/* Migration des anciennes données (status='pastille'|'carnet') vers le nouveau modèle */
function migrateOldPastilleData(){
  let changed=false;
  DATA.students.forEach(s=>{
    if(s.status==='pastille'){
      s.pastille={type:'auto', debut:todayISO(), fin:addDays(todayISO(),6)};
      s.status=s.savedMarche||MARCHE_DEFAULT;
      delete s.savedMarche;
      changed=true;
    }
    if(s.status==='carnet'){
      s.carnet={date:todayISO()};
      s.status=s.savedMarche||MARCHE_DEFAULT;
      delete s.savedMarche;
      changed=true;
    }
  });
  return changed;
}

/* ============================================================
   RETIRER DES POINTS
   ============================================================ */
async function retirerPoints(studentId,categorie,pts,motif){
  const s=DATA.students.find(x=>x.id===studentId);
  if(!s) return;
  const cat=CATEGORIES.find(c=>c.key===categorie);
  const newPts=Math.max(0,s.points-pts);
  s.points=newPts;
  logEvent(s,`-${pts} pt(s) — ${cat?cat.label:categorie}${motif?' : '+motif:''} (reste ${newPts}/20)`,{
    motif:(cat?cat.label:categorie)+(motif?' : '+motif:''),
    points:pts,type:'retrait',categorie
  });
  // Vérifier si l'élève tombe à 0 → pastille automatique jusqu'au dimanche
  if(newPts===0&&!estEnPastille(s)){
    // Trouver le prochain dimanche
    const d=new Date(todayISO()+'T00:00:00');
    const dayOfWeek=d.getDay(); // 0=dim, 1=lun...
    const daysUntilSunday=dayOfWeek===0?0:7-dayOfWeek;
    const finAuto=addDays(todayISO(),daysUntilSunday);
    s.pastille={type:'auto', debut:todayISO(), fin:finAuto};
    logEvent(s,`0 point — pastille automatique jusqu'au dimanche ${formatDateFr(finAuto)}.`);
    toast(`${s.nom} passe en pastille automatique (0 point).`);
  }
  // Vérifier retards → mettre à jour la liste des retenues
  if(categorie==='retard') checkRetardsSeuil(s);
  await saveData(`Retrait ${pts}pt(s) — ${s.nom}`);
}

/* Vérifie si l'élève atteint un seuil de retards (multiple de 4) dans le bloc
   et met à jour s.retenuePendante pour l'afficher dans l'onglet Retenues. */
function checkRetardsSeuil(s){
  const bloc=currentBloc();
  const dateJournalToISO=dateStr=>{
    if(!dateStr) return '';
    const parts=dateStr.split('/');
    if(parts.length!==3) return dateStr;
    return `${parts[2]}-${parts[1]}-${parts[0]}`;
  };
  let retardsDansBloc, blocDebut='';
  if(bloc&&bloc.semaines.length){
    blocDebut=bloc.semaines[0].start;
    const blocFin=bloc.semaines[bloc.semaines.length-1].end;
    retardsDansBloc=s.history.filter(h=>{
      if(h.categorie!=='retard') return false;
      const iso=dateJournalToISO(h.date);
      return iso>=blocDebut&&iso<=blocFin;
    });
  } else {
    retardsDansBloc=s.history.filter(h=>h.categorie==='retard');
    blocDebut='hors-bloc';
  }
  const count=retardsDansBloc.length;
  const nbHeures=Math.floor(count/4); // 1h au 4e, 2h au 8e, etc.
  if(nbHeures<1) return;
  // Identifiant unique par bloc + seuil
  const seuilId=`${blocDebut}:${nbHeures*4}`;
  if(!s.retenuesSeuils) s.retenuesSeuils=[];
  if(s.retenuesSeuils.includes(seuilId)) return; // déjà signalé
  s.retenuesSeuils.push(seuilId);
  // Créer ou mettre à jour la retenue en attente
  if(!s.retenuePendante){
    s.retenuePendante={seuilId, blocDebut, count, nbHeures};
    toast(`⏱ ${displayNom(s)} : ${nbHeures}h de retenue à poser (${count} retards)`);
  } else {
    // Seuil supérieur atteint — met à jour
    s.retenuePendante={seuilId, blocDebut, count, nbHeures};
    toast(`⏱ ${displayNom(s)} : ${nbHeures}h de retenue à poser (${count} retards)`);
  }
}

/* ============================================================
   SUPPRIMER UNE LIGNE DE JOURNAL
   ============================================================ */
async function deleteHistoryEntry(studentId,entryId){
  const s=DATA.students.find(x=>x.id===studentId);
  if(!s) return;
  const entry=s.history.find(h=>h.id===entryId);
  if(!entry) return;
  const isRetrait=entry.type==='retrait'&&entry.points;
  const isCarnet=(entry.label||'').toLowerCase().includes('carnet');
  if(!confirm(isRetrait?`Supprimer cette ligne ? Les ${entry.points} pt(s) seront recrédités.`:`Supprimer cette ligne du journal ?`)) return;
  s.history=s.history.filter(h=>h.id!==entryId);
  if(isRetrait) s.points=Math.min(20,s.points+entry.points);
  // Si on supprime l'entrée carnet du jour, on lève aussi l'état carnet
  if(isCarnet && estEnCarnet(s)){
    const autreCarnetAujourdhui=s.history.some(h=>
      (h.label||'').toLowerCase().includes('carnet') && h.date===new Date().toLocaleDateString('fr-FR')
    );
    if(!autreCarnetAujourdhui) s.carnet=null;
  }
  await saveData(`Suppression ligne journal ${s.nom}`);
  toast("Ligne supprimée."); render();
}

function countRetardsDansBloc(s, bloc){
  if(!bloc||!bloc.semaines.length) return s.history.filter(h=>h.categorie==='retard').length;
  const debut=bloc.semaines[0].start;
  const fin=bloc.semaines[bloc.semaines.length-1].end;
  return s.history.filter(h=>{
    if(h.categorie!=='retard') return false;
    const parts=(h.date||'').split('/');
    const iso=parts.length===3?`${parts[2]}-${parts[1]}-${parts[0]}`:h.date||'';
    return iso>=debut&&iso<=fin;
  }).length;
}

function renderRetenues(){
  const bloc=currentBloc();
  // Élèves ayant une retenue en attente
  const enAttente=DATA.students.filter(s=>s.retenuePendante).sort((a,b)=>a.nom.localeCompare(b.nom));
  // Recalculer pour s'assurer que les données sont à jour
  const rows=enAttente.map(s=>{
    const classe=DATA.classes.find(c=>c.id===s.classeId);
    const r=s.retenuePendante;
    const nbRetards=countRetardsDansBloc(s,bloc);
    return `<tr>
      <td><strong>${esc(displayNom(s))}</strong></td>
      <td>${classe?esc(classe.nom):'—'}</td>
      <td style="text-align:center;font-weight:700;font-size:16px;">${r.nbHeures}h</td>
      <td>${nbRetards} retard(s) dans ce bloc</td>
      <td><button class="btn primary" data-retenue-done="${s.id}">✓ Retenue effectuée</button></td>
    </tr>`;
  }).join('');

  return `
  <div class="row" style="justify-content:space-between;margin-bottom:14px;">
    <h2>⏱ Élèves en retenue pour retards</h2>
    <span class="small muted">${enAttente.length} élève(s) concerné(s)</span>

  <div class="card">
    ${enAttente.length
      ?`<table><thead><tr><th>Élève</th><th>Classe</th><th>Durée</th><th>Motif</th><th>Action</th></tr></thead><tbody>${rows}</tbody></table>`

function attachAdminEvents(){
  // Ajouter personnel
  const as=document.getElementById('btn-add-staff');
  if(as) as.addEventListener('click',async()=>{
    const nom=document.getElementById('staff-nom').value.trim();
    const fonction=document.getElementById('staff-fonction').value.trim();
    const code=document.getElementById('staff-code').value.trim();
    const role=detectRole(fonction);
    if(!nom||!code){toast("Remplis tous les champs.");return;}
    if(!/^\d{5}$/.test(code)){toast("Le code doit être exactement 5 chiffres.");return;}
    if(DATA.staff.some(s=>s.code===code)){toast("Ce code est déjà utilisé.");return;}
    DATA.staff.push({id:genId(),prenom:'',nom,fonction,code,role});
    document.getElementById('staff-nom').value='';
    document.getElementById('staff-fonction').value='';
    document.getElementById('staff-code').value='';
    await saveData(`Ajout personnel ${nom}`); toast("Personnel ajouté."); render();
  });
  // Modifier code
  document.querySelectorAll('[data-edit-code]').forEach(b=>{
    b.addEventListener('click',()=>{
      const id=b.dataset.editCode;
      document.getElementById('code-display-'+id).classList.add('hidden');
      document.getElementById('code-edit-'+id).classList.remove('hidden');
      document.getElementById('code-input-'+id).focus();
    });
  });
  document.querySelectorAll('[data-cancel-code]').forEach(b=>{
    b.addEventListener('click',()=>{
      const id=b.dataset.cancelCode;
      document.getElementById('code-display-'+id).classList.remove('hidden');
      document.getElementById('code-edit-'+id).classList.add('hidden');
    });
  });
  document.querySelectorAll('[data-save-code]').forEach(b=>{
    b.addEventListener('click',async()=>{
      const id=b.dataset.saveCode;
      const s=DATA.staff.find(x=>x.id===id);
      if(!s) return;
      const val=document.getElementById('code-input-'+id).value.trim();
      if(!/^\d{5}$/.test(val)){toast("Le code doit être exactement 5 chiffres.");return;}
      if(DATA.staff.some(x=>x.id!==id&&x.code===val)){toast("Ce code est déjà utilisé par un autre personnel.");return;}
      s.code=val;
      await saveData(`Modification code ${s.nom}`); toast(`Code de ${s.nom} mis à jour.`); render();
    });
  });
  // PDF individuel
  document.querySelectorAll('[data-pdf-staff]').forEach(b=>{
    b.addEventListener('click',()=>printStaffCode(b.dataset.pdfStaff));
  });
  // PDF tous les codes
  const pdfAll=document.getElementById('btn-pdf-all-staff');
  if(pdfAll) pdfAll.addEventListener('click',()=>printAllStaffCodes());
  // Supprimer personnel
  document.querySelectorAll('[data-del-staff]').forEach(b=>{
    b.addEventListener('click',async()=>{
      const s=DATA.staff.find(x=>x.id===b.dataset.delStaff);
      if(!s||!confirm(`Supprimer ${s.nom} ?`)) return;
      DATA.staff=DATA.staff.filter(x=>x.id!==s.id);
      await saveData(`Suppression personnel ${s.nom}`); toast("Supprimé."); render();
    });
  });
  // Import CSV/Excel enseignants
  const importStaffFile=document.getElementById('import-staff-file');
  if(importStaffFile) importStaffFile.addEventListener('change',async e=>{
    const file=e.target.files[0]; e.target.value='';
    if(!file) return;
    const statusEl=document.getElementById('import-staff-status');
    statusEl.textContent='Lecture...';
    try{
      const rows=await parseStaffFile(file);
      let added=0, skipped=0;
      rows.forEach(r=>{
        if(!r.nom||!r.code) return;
        if(!/^\d{5}$/.test(r.code)){ skipped++; return; }
        if(DATA.staff.some(s=>s.code===r.code)){ skipped++; return; }
        DATA.staff.push({id:genId(),prenom:'',nom:r.nom,fonction:r.fonction||'',code:r.code,role:detectRole(r.fonction||'')});
        added++;
      });
      await saveData(`Import ${added} personnel(s)`);
      statusEl.textContent=`${added} personnel(s) importé(s)${skipped?`, ${skipped} ignoré(s) (code invalide ou déjà existant)`:''}`;
      render();

  // Vacances
  const av=document.getElementById('btn-add-vac');
  if(av) av.addEventListener('click',async()=>{

    b.addEventListener('click',async()=>{

      DATA.customMotifs[key].push(val);
      await saveData(`Ajout motif ${key}`); toast("Motif ajouté."); render();
    });
  });
  // Motifs personnalisés — supprimer
  document.querySelectorAll('[data-del-motif]').forEach(b=>{

function exportFichePDF(studentId,period){
  const s=DATA.students.find(x=>x.id===studentId);
  if(!s) return;
  const classe=DATA.classes.find(c=>c.id===s.classeId);
  const blocs=buildBlocs();
  const today=todayISO();
  let targetBlocs=[];
  if(period==='current'){
    const b=currentBloc(); if(b) targetBlocs=[b];
  } else if(period==='previous'){
    const ci=blocs.findIndex(b=>b.semaines.some(sem=>today>=sem.start&&today<=sem.end));
    if(ci>0) targetBlocs=[blocs[ci-1]];
  } else {
    targetBlocs=blocs;
  }

  const weekRows=targetBlocs.flatMap(bloc=>
    bloc.semaines.map(sem=>{
      const w=DATA.weeks.find(x=>x.dateDebut===sem.start);
      const snap=w?w.snapshot.find(x=>x.id===s.id):null;
      return `<tr><td>${formatDateFr(sem.start)} → ${formatDateFr(sem.end)}</td>
        <td>${snap?(snap.enPastille?'Pastille '+marcheLabelNum(snap.status):marcheLabelNum(snap.status)):'En cours'}</td>
        <td>${snap&&!snap.enPastille?snap.points+' / 20':'—'}</td>
        <td>${snap?snap.contratValidé===true?'✓':snap.contratValidé===false?'✗':'—':'—'}</td></tr>`;
    })
  ).join('');

  const histItems=s.history.filter(h=>{
    if(period==='annual') return true;
    const b=period==='current'?targetBlocs[0]:targetBlocs[0];
    if(!b||!b.semaines.length) return true;
    return h.date>=b.semaines[0].start;
  }).slice().reverse();

  const histRows=histItems.map(h=>{
    const label=(h.label||'').toLowerCase();
    let rowStyle='';
    let ptStyle='font-weight:bold;';
    if(label.includes('pastille')){
      rowStyle='background:#fdeceb;color:#7a2020;';
      ptStyle+='color:#c0392b;';
    } else if(label.includes('carnet')){
      rowStyle='background:#fef5ec;color:#7a4000;';
      ptStyle+='color:#e67e22;';
    } else if(label.includes('retenue')){
      rowStyle='background:#fef9ec;color:#7a5a00;font-weight:bold;';
      ptStyle+='color:#f39c12;';
    }
    const pts=h.points?`<span style="${ptStyle}">−${h.points}</span>`:'—';
    return `<tr style="${rowStyle}">
      <td>${esc(h.date)}</td><td>${esc(h.motif||h.label)}</td>
      <td style="text-align:center;">${pts}</td><td>${esc(h.auteur||'—')}</td>
    </tr>`;
  }).join('');

  const win=window.open('','_blank');
  if(!win){toast("Pop-up bloquée. Autorise les pop-ups et réessaie.");return;}
  win.document.write(`<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8">
    <title>Récapitulatif — ${esc(displayNom(s))}</title>
    <style>
    body{font-family:Georgia,serif;color:#23262b;max-width:720px;margin:30px auto;padding:0 20px;}
    h1{font-size:22px;margin-bottom:2px;}
    .sub{color:#666;font-size:13px;margin-bottom:24px;}
    h2{font-size:14px;font-weight:bold;text-transform:uppercase;letter-spacing:.08em;
       border-bottom:2px solid #23262b;padding-bottom:4px;margin-top:28px;margin-bottom:0;}
    table{width:100%;border-collapse:collapse;font-size:13px;margin-top:10px;}
    th{text-align:left;padding:7px 8px;border-bottom:2px solid #ccc;
       font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#555;background:#f5f4f0;}
    td{padding:7px 8px;border-bottom:1px solid #e3e3e3;vertical-align:top;}
    tr:nth-child(even) td{background:#faf9f6;}
    .legend{margin-top:20px;padding:10px 14px;background:#f5f4f0;border-radius:6px;font-size:11px;color:#555;}
    .legend span{display:inline-block;width:12px;height:12px;border-radius:2px;margin-right:4px;vertical-align:middle;}
    .footer{margin-top:32px;font-size:11px;color:#999;border-top:1px solid #e3e3e3;padding-top:10px;}
    @media print{body{margin:0;padding:14px;}}
    </style></head><body>
    <h1>Récapitulatif — ${esc(displayNom(s))}</h1>
    <div class="sub">${classe?esc(classe.nom):'—'} · ${period==='current'?'Bloc en cours':period==='previous'?'Bloc précédent':'Bilan annuel'} · Généré le ${formatDateFr(today)}</div>
    <h2>Suivi par semaine</h2>
    ${weekRows?`<table><thead><tr><th>Semaine</th><th>Marche</th><th>Points</th><th>Contrat</th></tr></thead><tbody>${weekRows}</tbody></table>`:'<p style="color:#888;font-size:13px;">Aucune donnée.</p>'}
    <h2>Journal des évènements</h2>
    ${histRows?`<table><thead><tr><th>Date</th><th>Motif</th><th style="text-align:center;">Points</th><th>Par</th></tr></thead><tbody>${histRows}</tbody></table>

      <span style="background:#fef9ec;border:1px solid #f7dc6f;"></span>Retenue

    <scri`+`pt>window.onload=()=>{window.print();};</scri`+`pt></body></html>`);
  win.document.close();
}

   IMPORT CSV/EXCEL
   ============================================================ */
/* parseStaffFile : lit un CSV/Excel avec colonnes Nom, Fonction, Code, Rôle (optionnel).
   Si la colonne Rôle contient "vie-scolaire", le personnel aura accès à l'onglet Retenues.
   Retourne un tableau d'objets {nom, fonction, code, role}. */
function parseStaffFile(file){
  return new Promise((resolve,reject)=>{
    const ext=file.name.toLowerCase().split('.').pop();
    const norm=s=>String(s||'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    const processRows=rows=>{
      if(!rows.length){ resolve([]); return; }
      const header=rows[0].map(c=>norm(c));
      const ni=header.findIndex(h=>h.includes('nom'));
      const fi=header.findIndex(h=>h.includes('fonction')||h.includes('poste')||h.includes('titre'));
      const ci=header.findIndex(h=>h.includes('code'));
      const hasHeader=ni>=0||ci>=0;
      const ni2=ni>=0?ni:0, fi2=fi>=0?fi:1, ci2=ci>=0?ci:(fi>=0?2:1);
      const result=[];
      rows.slice(hasHeader?1:0).forEach(row=>{
        const nom=String(row[ni2]||'').trim();
        const fonction=String(row[fi2]||'').trim();
        const code=String(row[ci2]||'').trim().replace(/\D/g,'').slice(0,5);
        const role=detectRole(fonction);
        if(nom) result.push({nom,fonction,code,role});
      });
      resolve(result);
    };
    if(ext==='csv'){
      Papa.parse(file,{complete:r=>processRows(r.data),error:reject});
    } else {
      const reader=new FileReader();
      reader.onload=e=>{
        try{
          const wb=XLSX.read(e.target.result,{type:'array'});
          const sheet=wb.Sheets[wb.SheetNames[0]];
          processRows(XLSX.utils.sheet_to_json(sheet,{header:1}));
        }catch(err){reject(err);}
      };
      reader.onerror=()=>reject(new Error("lecture impossible"));
      reader.readAsArrayBuffer(file);
    }
  });
}

function extractNamesFromFile(file){
  return new Promise((resolve,reject)=>{
    const ext=file.name.toLowerCase().split('.').pop();
    if(ext==='csv'){
      Papa.parse(file,{complete:r=>{resolve(r.data.map(rowToName).filter(Boolean));},error:reject});
    } else {
      const reader=new FileReader();
      reader.onload=e=>{
        try{
          const wb=XLSX.read(e.target.result,{type:'array'});
          const sheet=wb.Sheets[wb.SheetNames[0]];
          resolve(XLSX.utils.sheet_to_json(sheet,{header:1}).map(rowToName).filter(Boolean));
        }catch(err){reject(err);}
      };
      reader.onerror=()=>reject(new Error("lecture impossible"));
      reader.readAsArrayBuffer(file);
    }
  });
}
function rowToName(row){
  if(!row||!row.length) return null;
  const cells=row.map(c=>(c===undefined||c===null)?'':String(c).trim()).filter(Boolean);
  if(!cells.length) return null;
  const joined=cells.slice(0,2).join(' ').trim();
  const lower=joined.toLowerCase();
  if(['nom','prenom','prénom','nom prenom','nom prénom','élève','eleve'].includes(lower)) return null;
  return joined;
}

  const win=window.open('','_blank');
  if(!win){toast("Pop-up bloquée.");return;}
  win.document.write(`<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8">

}

function exportData(){
  const blob=new Blob([JSON.stringify(DATA,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`carnet-suivi-${todayISO()}.json`; a.click();
  URL.revokeObjectURL(url); toast("Fichier téléchargé.");
}
